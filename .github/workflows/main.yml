name: CI/CD Pipeline - VV&T

# Executa a pipeline automaticamente sempre que houver um novo push
on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 1. Provisiona ambiente Linux (Ubuntu)
    runs-on: ubuntu-latest
    
    # 2. Instala e configura o MySQL Server 8.0
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: db_produtos
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Instalar dependências Python
      run: |
        python -m pip install --upgrade pip
        pip install pytest mysql-connector-python

    - name: Configurar Banco de Dados e Tabela (Executar schema.sql)
      run: mysql -h 127.0.0.1 -u root -proot db_produtos < schema.sql

    - name: Executar Testes Automatizados (Pytest)
      run: pytest test_gerador_codigo.py -v

    - name: Executar App Python para Geração de Código
      run: python app.py